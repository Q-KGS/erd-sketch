spring:
  datasource:
    url: jdbc:h2:file:/data/erdsketch;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    com.erdsketch: INFO
    org.springframework.security: WARN
