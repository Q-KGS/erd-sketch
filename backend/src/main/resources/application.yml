spring:
  application:
    name: erdsketch-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/erdsketch
    username: ${DB_USERNAME:erdsketch}
    password: ${DB_PASSWORD:erdsketch}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:erdsketch-secret-key-change-in-production-must-be-at-least-256-bits-long}
    access-token-expiry: 3600000   # 1 hour
    refresh-token-expiry: 2592000000  # 30 days

logging:
  level:
    com.erdsketch: DEBUG
    org.springframework.security: INFO
