name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Build & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build & Test
        run: ./mvnw verify
        working-directory: backend

  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Unit Tests
        run: npm test -- --run
        working-directory: frontend

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
      - name: E2E Tests
        run: npm run test:e2e:ci
        working-directory: frontend
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  e2e-integration:
    name: E2E Integration Tests (Phase 4)
    runs-on: ubuntu-latest
    needs: [backend, frontend-lint, frontend-test]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: erdsketch_e2e
          POSTGRES_USER: erdsketch
          POSTGRES_PASSWORD: erdsketch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Copy Frontend to Backend Static
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/. backend/src/main/resources/static/

      - name: Build Backend (skip tests)
        run: ./mvnw package -DskipTests -q
        working-directory: backend

      - name: Start Backend
        run: |
          java -Xmx256m -jar target/*.jar \
            --spring.profiles.active=e2e \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/erdsketch_e2e \
            --spring.datasource.username=erdsketch \
            --spring.datasource.password=erdsketch \
            --app.jwt.secret=e2e-test-secret-key-for-playwright-256bits-padding-here-aaa &
        working-directory: backend

      - name: Wait for Backend
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready (attempt $i)"
              break
            fi
            echo "Attempt $i/40: status=$STATUS, waiting 3s..."
            sleep 3
          done
          [ "$STATUS" = "200" ] || (echo "Backend failed to start" && exit 1)

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Phase 4 E2E Tests
        run: npm run test:e2e:integration:ci
        working-directory: frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-phase4-report
          path: frontend/playwright-report/
          retention-days: 7

  e2e-phase5:
    name: E2E Integration Tests (Phase 5)
    runs-on: ubuntu-latest
    needs: [backend, frontend-lint, frontend-test]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: erdsketch_e2e
          POSTGRES_USER: erdsketch
          POSTGRES_PASSWORD: erdsketch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Copy Frontend to Backend Static
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/. backend/src/main/resources/static/

      - name: Build Backend (skip tests)
        run: ./mvnw package -DskipTests -q
        working-directory: backend

      - name: Start Backend
        run: |
          java -Xmx256m -jar target/*.jar \
            --spring.profiles.active=e2e \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/erdsketch_e2e \
            --spring.datasource.username=erdsketch \
            --spring.datasource.password=erdsketch \
            --app.jwt.secret=e2e-test-secret-key-for-playwright-256bits-padding-here-aaa &
        working-directory: backend

      - name: Wait for Backend
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready (attempt $i)"
              break
            fi
            echo "Attempt $i/40: status=$STATUS, waiting 3s..."
            sleep 3
          done
          [ "$STATUS" = "200" ] || (echo "Backend failed to start" && exit 1)

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Phase 5 E2E Tests
        run: npm run test:e2e:phase5:ci
        working-directory: frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-phase5-report
          path: frontend/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Fly.io
    needs: [backend, frontend-lint, frontend-test, frontend-e2e, e2e-integration, e2e-phase5]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: fly deploy --remote-only --auto-rollback --wait-timeout 180
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://erdsketch.fly.dev/actuator/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"
